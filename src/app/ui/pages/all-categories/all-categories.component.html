<div nz-row nzJustify="center" style="gap: 2rem;">
  <div nz-col nzXs="24" nzSm="24" nzMd="16" nzLg="14" nzXl="10">
    <nz-input-group [nzSuffix]="suffixIcon">
      <input
        placeholder='Search Through Categories...'
        nz-input
        [(ngModel)]="inputValue"
        (ngModelChange)="onChange($event)"
        [nzAutocomplete]="auto"
      />
    </nz-input-group>

    <ng-template #suffixIcon>
      @if (inputValue) {
        <span nz-icon
              class="ant-input-clear-icon"
              nzTheme="fill"
              nzType="close-circle"
              (click)="clearSearch()"></span>
      } @else {
        <span nz-icon nzType="search"></span>
      }
    </ng-template>

    <nz-autocomplete [nzDataSource]="filteredCategoryNames" #auto></nz-autocomplete>
  </div>

  <div nz-col nzSpan="24">
    <div nz-row [nzGutter]="[15, 15]">
      @for(c of categories; track c) {
        <div nz-col nzXs="24" nzSm="24" nzMd="12" nzLg="8" nzXl="6" nzXXl="4">
          <app-category-display-card [category]="c" />
        </div>
      }
    </div>
  </div>

  @if(categories.length === 0) {
    <div nz-col nzSpan="24">
      <nz-empty nzNotFoundContent="No tools found." />
    </div>
  }
</div>
