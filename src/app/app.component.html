<nz-layout class="app-layout">
  <nz-sider class="menu-sidebar"
    nzCollapsible
    nzWidth="256px"
    nzBreakpoint="md"
    [(nzCollapsed)]="isCollapsed"
    [nzTrigger]="null">
    <div class="sidebar-wrapper">
      <div class="sidebar-logo">
        <a routerLink="/">
          <img src="../assets/images/ntools_logo_light_h.svg" alt="logo">
<!--          <h1>Ntools</h1>-->
        </a>
      </div>
      <ul nz-menu nzTheme="dark" nzMode="inline" [nzInlineCollapsed]="isCollapsed" class="outer-ul">
        <li nz-menu-item [nzSelected]="isRouteActive('/')">
          <a routerLink="/"><span nz-icon nzType="home"></span><span>Home</span></a>
        </li>
        <li nz-menu-item [nzSelected]="isRouteActive('/categories')">
          <a routerLink="/categories"><span nz-icon nzType="appstore"></span><span>Categories</span></a>
        </li>
        <li nz-menu-item [nzSelected]="isRouteActive('/tools')">
          <a routerLink="/tools"><span nz-icon nzType="tool"></span><span>All Tools</span></a>
        </li>
        <li nz-menu-item [nzSelected]="isRouteActive('/info')">
          <a routerLink="/info"><span nz-icon nzType="info-circle"></span><span>Info</span></a>
        </li>
        <li nz-submenu nzTitle="Contact Us" nzIcon="phone">
          <ul>
            <li nz-menu-item [nzSelected]="isRouteActive('/contact/send-a-message')">
              <a routerLink="/contact/send-a-message">Send a Message</a>
            </li>
            <li nz-menu-item [nzSelected]="isRouteActive('/contact/request-new-tool')">
              <a routerLink="/contact/request-new-tool">Request New Tool</a>
            </li>
            <li nz-menu-item [nzSelected]="isRouteActive('/contact/report-a-bug')">
              <a routerLink="/contact/report-a-bug">Report a Bug</a>
            </li>
          </ul>
        </li>
      </ul>
      <span class="header-trigger" (click)="isCollapsed = !isCollapsed">
          <span class="trigger"
                nz-icon
                nzType="left"
                [class.rotated]="isCollapsed"
          ></span>
        </span>
    </div>
  </nz-sider>
  <nz-layout>
    @if(displayHeader) {
      <nz-header>
        <div class="app-header">
          <nz-page-header [nzTitle]="title" [nzSubtitle]="subtitle" [nzBackIcon]="back"></nz-page-header>
        </div>
      </nz-header>
    }
    <nz-content>
      <div class="inner-content">
        <router-outlet></router-outlet>
      </div>
    </nz-content>
  </nz-layout>
</nz-layout>
